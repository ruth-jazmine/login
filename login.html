<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Konek Portal - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Suez+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Suez+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="loginStyle.css">
</head>

<body>

    <div class="portal-container">
        
        <div class="left-panel">
            <div class="login-card">
                
                <div class="avatar-circle">
                    <img src="https://i.postimg.cc/vT1jztKv/avatarlogo.png" alt="User Profile" class="profile-img">
                </div>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" placeholder="Enter your Email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock-open icon-left"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                            <i class="fa-regular fa-eye icon-right" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-helpers">
                        <label class="terms-label">
                            <input type="checkbox" name="terms" required>
                            <span>I agree to the <a href="#" class="blue-link">Terms and Conditions</a></span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <div class="btn-submit-container">
                        <button type="submit" class="btn-submit">Log-In</button>
                    </div>

                    <div class="admin-link-container">
                        <a href="adminLogin.html" class="admin-link">Login as an Admin</a>
                    </div>

                    <p class="signup-text">
                        Don't have an account yet? <a href="#" class="red-link">Sign Up Here</a>
                    </p>
                </form>

            </div>
        </div>

        <div class="right-panel">
            <div class="brand-content">
                <h1 class="brand-title">I-Konek</h1>
                
                <div class="graphic-container">
                    <img src="https://i.postimg.cc/LXnbVVq0/login-design.png" alt="I-Konek Showcase" class="responsive-graphic">
                </div>
            </div>
        </div>

    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
